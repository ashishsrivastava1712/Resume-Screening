<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecruitAI - Resume Screening</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <h1 class="text-center mb-4">RecruitAI - Resume Screening</h1>
                
                <div class="card shadow-lg">
                    <div class="card-body">
                        <!-- Job Description Section -->
                        <div class="mb-4">
                            <h3 class="mb-3">📋 Job Description</h3>
                            <div class="form-group">
                                <label for="jd_file" class="form-label">Upload JD File (PDF, DOCX, TXT):</label>
                                <input type="file" class="form-control" id="jd_file" accept=".pdf,.docx,.doc,.txt">
                            </div>
                            <div class="form-group">
                                <label for="jd_text" class="form-label">Or paste JD text:</label>
                                <textarea class="form-control" id="jd_text" rows="4" placeholder="Paste job description here..."></textarea>
                            </div>
                        </div>

                        <hr>

                        <!-- Resume Upload Section -->
                        <div class="mb-4">
                            <h3 class="mb-3">📄 Resumes</h3>
                            <div class="form-group">
                                <label for="resume_files" class="form-label">Upload Resumes:</label>
                                <input type="file" class="form-control" id="resume_files" multiple accept=".pdf,.docx,.doc,.txt">
                                <small class="text-muted">Select multiple files (PDF, DOCX, DOC, TXT)</small>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="d-grid gap-2 d-sm-flex justify-content-center">
                            <button class="btn btn-primary btn-lg" id="screen_btn">🚀 Screen Resumes</button>
                            <button class="btn btn-success btn-lg" id="export_csv_btn" disabled>📥 Export CSV</button>
                            <button class="btn btn-info btn-lg" id="export_excel_btn" disabled>📥 Export Excel</button>
                        </div>
                    </div>
                </div>

                <!-- Results Section -->
                <div id="results_section" class="mt-5" style="display:none;">
                    <h2 class="mb-3">📊 Screening Results</h2>
                    <div id="loading" class="text-center mb-3" style="display:none;">
                        <div class="spinner-border" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                    <div id="results_table" class="table-responsive"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/xlsx@latest/dist/xlsx.full.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
